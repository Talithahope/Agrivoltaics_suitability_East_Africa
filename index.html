<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrivoltaic Suitability — East Africa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #080c14; color: #e0e4ec; height: 100vh; overflow: hidden; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; background: #080c14; }

  .title-bar {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 1000;
    background: rgba(10,14,23,0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 24px;
    text-align: center; pointer-events: none; white-space: nowrap;
  }
  .title-bar h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; color: #f0f2f5; }
  .title-bar p { font-size: 11px; color: #8b92a0; margin-top: 2px; font-weight: 300; }

  .control-panel {
    position: absolute; top: 90px; right: 16px; z-index: 1000;
    background: rgba(10,14,23,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 20px; width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-height: calc(100vh - 120px); overflow-y: auto;
  }
  .panel-section { margin-bottom: 16px; }
  .panel-section:last-child { margin-bottom: 0; }
  .panel-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; margin-bottom: 8px; }

  .layer-btn {
    display: block; width: 100%; padding: 8px 12px; margin-bottom: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; color: #9ca3af; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 400; cursor: pointer; transition: all 0.2s ease; text-align: left;
  }
  .layer-btn:hover { background: rgba(255,255,255,0.08); color: #d1d5db; }
  .layer-btn.active { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: #4ade80; font-weight: 500; }
  .layer-btn .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #374151; margin-right: 8px; transition: background 0.2s ease; vertical-align: middle; }
  .layer-btn.active .dot { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.4); }

  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row input[type="range"] { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
  .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #e0e4ec; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .slider-value { font-size: 11px; color: #9ca3af; min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }

  .legend-bar { display: flex; height: 14px; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
  .legend-bar div { flex: 1; }
  .legend-labels { display: flex; justify-content: space-between; font-size: 9px; color: #6b7280; }

  .drop-zone {
    border: 1.5px dashed rgba(255,255,255,0.15); border-radius: 10px; padding: 14px;
    text-align: center; cursor: pointer; transition: all 0.25s ease;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: rgba(74,222,128,0.5); background: rgba(74,222,128,0.04); }
  .drop-zone-icon { font-size: 20px; margin-bottom: 4px; }
  .drop-zone-text { font-size: 11px; color: #6b7280; line-height: 1.5; }
  .drop-zone-text strong { color: #9ca3af; font-weight: 500; }

  .file-tag {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px; padding: 6px 10px; margin-bottom: 6px; font-size: 11px; color: #9ca3af;
  }
  .file-tag .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 170px; }
  .file-tag .remove { cursor: pointer; color: #6b7280; font-size: 14px; margin-left: 8px; line-height: 1; }
  .file-tag .remove:hover { color: #ef4444; }

  .loading { display: none; text-align: center; padding: 8px; font-size: 11px; color: #4ade80; }
  .loading.visible { display: block; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(74,222,128,0.2); border-top-color: #4ade80; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .leaflet-control-zoom { border: none !important; }
  .leaflet-control-zoom a { background: rgba(10,14,23,0.88) !important; color: #9ca3af !important; border: 1px solid rgba(255,255,255,0.08) !important; backdrop-filter: blur(12px); }
  .leaflet-control-zoom a:hover { background: rgba(10,14,23,0.95) !important; color: #e0e4ec !important; }
  .leaflet-control-attribution { background: rgba(10,14,23,0.7) !important; color: #4b5563 !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: #6b7280 !important; }

  .city-label { background: none !important; border: none !important; box-shadow: none !important; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500; color: #d1d5db; text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 6px rgba(0,0,0,0.5); white-space: nowrap; }
  .city-dot { width: 5px; height: 5px; background: #e0e4ec; border-radius: 50%; border: 1px solid rgba(0,0,0,0.3); box-shadow: 0 0 4px rgba(255,255,255,0.2); }
  .country-label { background: none !important; border: none !important; box-shadow: none !important; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 300; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.25); text-shadow: 0 1px 4px rgba(0,0,0,0.6); white-space: nowrap; }
  .site-label { background: none !important; border: none !important; box-shadow: none !important; font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 500; color: #fbbf24; text-shadow: 0 1px 3px rgba(0,0,0,0.8); white-space: nowrap; }

  /* Custom light land tile overlay */
  .land-tiles { filter: brightness(0.3) contrast(1.2); }
</style>
</head>
<body>
<div id="map"></div>

<div class="title-bar">
  <h1>Agrivoltaic Suitability — East Africa</h1>
  <p>Multi-criteria spatial analysis</p>
</div>

<div class="control-panel">
  <div class="panel-section">
    <div class="panel-label">Scenario</div>
    <button class="layer-btn active" id="btn-cv" onclick="toggleLayer('cv')"><span class="dot"></span>Climate Vulnerable</button>
    <button class="layer-btn" id="btn-mp" onclick="toggleLayer('mp')"><span class="dot"></span>Maximum Productivity</button>
  </div>
  <div class="panel-section">
    <div class="panel-label">Layer Opacity</div>
    <div class="slider-row">
      <input type="range" id="opacity-slider" min="0" max="100" value="75" oninput="setOpacity(this.value)">
      <span class="slider-value" id="opacity-val">75%</span>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Suitability Score</div>
    <div class="legend-bar" id="legend-bar"></div>
    <div class="legend-labels"><span>4 — Marginal</span><span>9 — Highest</span></div>
    <div style="margin-top:6px;display:flex;align-items:center;gap:6px;">
      <div style="width:14px;height:14px;border-radius:3px;background:rgba(190,190,190,0.5);border:1px solid rgba(255,255,255,0.1);"></div>
      <span style="font-size:9px;color:#6b7280;">0 — Unsuitable</span>
      <div style="width:14px;height:14px;border-radius:3px;background:transparent;border:1px solid rgba(255,255,255,0.1);margin-left:8px;"></div>
      <span style="font-size:9px;color:#6b7280;">Excluded</span>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Replace Layer (GeoTIFF)</div>
    <div id="file-list"></div>
    <div class="drop-zone" id="drop-zone">
      <div class="drop-zone-icon">📁</div>
      <div class="drop-zone-text"><strong>Drop GeoTIFF here</strong><br>or click to browse</div>
      <input type="file" id="file-input" accept=".tif,.tiff,.geotiff" multiple style="display:none">
    </div>
    <div class="loading" id="loading"><span class="spinner"></span>Processing raster...</div>
  </div>
</div>

<script>
// Pink-to-green ramp matching paper
const COLORS = {
  4: [197,27,125],   // deep pink/magenta
  5: [222,119,174],  // pink
  6: [237,218,116],  // yellow
  7: [166,217,106],  // light green
  8: [77,172,38],    // green
  9: [0,120,55],     // dark green
};

// Build legend bar
const legendBar = document.getElementById('legend-bar');
[4,5,6,7,8,9].forEach(v => {
  const d = document.createElement('div');
  const c = COLORS[v];
  d.style.background = `rgb(${c.join(',')})`;
  legendBar.appendChild(d);
});

// Map
const map = L.map('map', { center: [5, 38], zoom: 5, zoomControl: true, minZoom: 3, maxZoom: 12 });

// Create panes for proper layering
map.createPane('landPane');
map.getPane('landPane').style.zIndex = 200;

map.createPane('rasterPane');
map.getPane('rasterPane').style.zIndex = 350;

map.createPane('labelsPane');
map.getPane('labelsPane').style.zIndex = 500;

// Layer 1: Light positron basemap at low opacity for land/sea distinction
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CARTO &copy; OSM', subdomains: 'abcd', maxZoom: 19,
  pane: 'landPane', opacity: 0.12, className: 'land-tiles'
}).addTo(map);

// Layer 2: Dark basemap for the main look
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19, pane: 'landPane', opacity: 0.6
}).addTo(map);

// Layer 3: Labels and borders on top
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19, pane: 'labelsPane'
}).addTo(map);

// Cities
const cities = [
  {n:"Addis Ababa",lt:9.02,ln:38.75},{n:"Nairobi",lt:-1.29,ln:36.82},{n:"Dar es Salaam",lt:-6.79,ln:39.28},
  {n:"Kampala",lt:0.35,ln:32.58},{n:"Khartoum",lt:15.59,ln:32.53},{n:"Mogadishu",lt:2.05,ln:45.32},
  {n:"Juba",lt:4.85,ln:31.58},{n:"Kigali",lt:-1.94,ln:30.06},{n:"Bujumbura",lt:-3.38,ln:29.36},
  {n:"Asmara",lt:15.34,ln:38.93},{n:"Djibouti City",lt:11.59,ln:43.15},{n:"Mombasa",lt:-4.04,ln:39.67},
  {n:"Mwanza",lt:-2.52,ln:32.90},{n:"Kisumu",lt:-0.09,ln:34.77},{n:"Bahir Dar",lt:11.60,ln:37.39},
  {n:"Port Sudan",lt:19.62,ln:37.22},{n:"Dodoma",lt:-6.17,ln:35.74},{n:"Hargeisa",lt:9.56,ln:44.06},
  {n:"Nakuru",lt:-0.30,ln:36.07}
];
const cityGroup = L.layerGroup();
cities.forEach(c => {
  L.marker([c.lt,c.ln],{icon:L.divIcon({className:'city-dot',iconSize:[5,5],iconAnchor:[2.5,2.5]}),pane:'labelsPane'}).addTo(cityGroup);
  L.marker([c.lt,c.ln],{icon:L.divIcon({className:'city-label',html:c.n,iconSize:[100,14],iconAnchor:[-5,7]}),pane:'labelsPane'}).addTo(cityGroup);
});
cityGroup.addTo(map);

// Study sites (Randle-Boggis et al. 2025)
const sites = [
  {n:"Morogoro trial site",loc:"SAT, Tanzania",lt:-6.82,ln:37.66,cv:6,mp:7,ler:1.88},
  {n:"Isinya trial site",loc:"Latia, Kenya",lt:-1.83,ln:36.84,cv:7,mp:7,ler:1.77}
];
const siteGroup = L.layerGroup();
sites.forEach(s => {
  L.circleMarker([s.lt,s.ln],{radius:7,color:'#f59e0b',fillColor:'#f59e0b',fillOpacity:0.8,weight:2,pane:'labelsPane'})
    .bindPopup(`<div style="font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.5;min-width:180px;">
      <strong style="font-size:13px;">${s.n}</strong><br><span style="color:#666;">${s.loc}</span>
      <hr style="border:none;border-top:1px solid #eee;margin:6px 0;">
      <b>CV score:</b> ${s.cv}/9 &nbsp; <b>MP score:</b> ${s.mp}/9<br><b>LER:</b> ${s.ler}
      <br><span style="color:#888;font-size:10px;">Randle-Boggis et al. (2025)</span></div>`)
    .addTo(siteGroup);
  L.marker([s.lt,s.ln],{icon:L.divIcon({className:'site-label',html:'▲ '+s.n,iconSize:[140,14],iconAnchor:[-10,7]}),pane:'labelsPane'}).addTo(siteGroup);
});
siteGroup.addTo(map);

// Raster layers
const cvBounds = L.latLngBounds(L.latLng(-14.5075, 19.6989), L.latLng(24.5416, 53.4314));
let layers = { cv: null, mp: null };
let activeLayer = 'cv';
let currentOpacity = 0.75;

// Pre-load both layers

mpOverlay.addTo(map);
layers.mp = mpOverlay;

function toggleLayer(id) {
  activeLayer = id;
  document.getElementById('btn-cv').classList.toggle('active', id === 'cv');
  document.getElementById('btn-mp').classList.toggle('active', id === 'mp');
  if (layers.cv) layers.cv.setOpacity(id === 'cv' ? currentOpacity : 0);
  if (layers.mp) layers.mp.setOpacity(id === 'mp' ? currentOpacity : 0);
}

function setOpacity(val) {
  currentOpacity = val / 100;
  document.getElementById('opacity-val').textContent = val + '%';
  if (layers[activeLayer]) layers[activeLayer].setOpacity(currentOpacity);
}

// GeoTIFF loader
async function loadGeoTIFF(file, layerId) {
  const loading = document.getElementById('loading');
  loading.classList.add('visible');
  try {
    const arrayBuffer = await file.arrayBuffer();
    const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
    const image = await tiff.getImage();
    const rasters = await image.readRasters();
    const data = rasters[0];
    const width = image.getWidth(), height = image.getHeight();
    const bbox = image.getBoundingBox();
    const fileDir = image.getFileDirectory();
    let originX, originY, pixelW, pixelH;
    if (fileDir.ModelTiepoint && fileDir.ModelPixelScale) {
      originX = fileDir.ModelTiepoint[3]; originY = fileDir.ModelTiepoint[4];
      pixelW = fileDir.ModelPixelScale[0]; pixelH = -fileDir.ModelPixelScale[1];
    } else { originX = bbox[0]; originY = bbox[3]; pixelW = (bbox[2]-bbox[0])/width; pixelH = -(bbox[3]-bbox[1])/height; }

    const canvas = document.createElement('canvas');
    canvas.width = width; canvas.height = height;
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(width, height);
    const colMap = {
      0:[190,190,190,80], 4:[197,27,125,220], 5:[222,119,174,220],
      6:[237,218,116,220], 7:[166,217,106,220], 8:[77,172,38,220], 9:[0,120,55,220]
    };
    for (let i = 0; i < data.length; i++) {
      const val = data[i], px = i * 4;
      const c = colMap[Math.round(val)];
      if (c) { imgData.data[px]=c[0]; imgData.data[px+1]=c[1]; imgData.data[px+2]=c[2]; imgData.data[px+3]=c[3]; }
    }
    ctx.putImageData(imgData, 0, 0);
    const south = originY + pixelH * height, north = originY, west = originX, east = originX + pixelW * width;
    const bounds = L.latLngBounds(L.latLng(south, west), L.latLng(north, east));
    if (layers[layerId]) map.removeLayer(layers[layerId]);
    const overlay = L.imageOverlay(canvas.toDataURL(), bounds, {
      opacity: layerId === activeLayer ? currentOpacity : 0, interactive: false, pane: 'rasterPane'
    });
    overlay.addTo(map); layers[layerId] = overlay;
    if (layerId === activeLayer) map.fitBounds(bounds, { padding: [30,30] });
    addFileTag(file.name, layerId);
  } catch (err) {
    console.error(err);
    alert('Error loading GeoTIFF: ' + err.message + '\n\nEnsure the file is in EPSG:4326.');
  } finally { loading.classList.remove('visible'); }
}

function addFileTag(name, layerId) {
  const list = document.getElementById('file-list');
  const existing = document.getElementById('tag-' + layerId);
  if (existing) existing.remove();
  const tag = document.createElement('div'); tag.className = 'file-tag'; tag.id = 'tag-' + layerId;
  tag.innerHTML = `<span class="name" title="${name}">${layerId==='cv'?'🌡️':'⚡'} ${name}</span><span class="remove" onclick="removeLayer('${layerId}')">&times;</span>`;
  list.appendChild(tag);
}
function removeLayer(layerId) {
  if (layers[layerId]) { map.removeLayer(layers[layerId]); layers[layerId] = null; }
  const tag = document.getElementById('tag-' + layerId); if (tag) tag.remove();
}

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  for (const file of files) {
    if (!file.name.match(/\.(tif|tiff|geotiff)$/i)) { alert('Please upload a GeoTIFF (.tif)'); continue; }
    const n = file.name.toLowerCase();
    let layerId;
    if (n.includes('vuln') || n.includes('cv') || n.includes('climate') || n.includes('marginal')) layerId = 'cv';
    else if (n.includes('prod') || n.includes('mp') || n.includes('max')) layerId = 'mp';
    else {
      const c = prompt(`Which scenario is "${file.name}"?\n\n1 = Climate Vulnerable\n2 = Maximum Productivity`, '2');
      if (c==='1') layerId='cv'; else if (c==='2') layerId='mp'; else continue;
    }
    loadGeoTIFF(file, layerId);
  }
}
